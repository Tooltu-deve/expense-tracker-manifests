# Create with: kubectl create secret generic mysql-secret --from-literal=root-password=CHANGE_ME --from-literal=password=CHANGE_ME -n expense-tracker
# Do NOT commit real secrets. Use Sealed Secrets or External Secrets in production.
apiVersion: v1
kind: Secret
metadata:
  name: mysql-secret
  namespace: expense-tracker
  labels:
    app: mysql
type: Opaque
stringData:
  root-password: "changeme"
  password: "changeme"
