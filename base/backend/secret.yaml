# Override with: kubectl create secret generic backend-secret -n expense-tracker \
#   --from-literal=DB_PASSWORD=yourpassword \
#   --from-literal=JWT_SECRET=your-jwt-secret
# Or use Sealed Secrets / External Secrets
apiVersion: v1
kind: Secret
metadata:
  name: backend-secret
  namespace: expense-tracker
type: Opaque
stringData:
  DB_PASSWORD: changeme
  JWT_SECRET: changeme-jwt-secret
